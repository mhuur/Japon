<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnostic localStorage</title>
<style>
  body{margin:0;padding:16px;background:#0a0f1c;color:#cde;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5}
  h1{font-size:18px;color:#8cf;margin:0 0 12px}
  h2{font-size:14px;color:#fa6;margin:20px 0 6px;border-bottom:1px solid #234;padding-bottom:4px}
  .row{margin:6px 0;padding:8px;background:#111a2e;border-radius:6px;word-break:break-all}
  .key{color:#9cf;font-weight:600;font-size:12px;margin-bottom:4px}
  .val{color:#dde;font-family:'Courier New',monospace;font-size:11px;white-space:pre-wrap;max-height:200px;overflow:auto;background:#0a1020;padding:6px;border-radius:4px;border:1px solid #234}
  .summary{background:#1a2540;padding:12px;border-radius:8px;margin-bottom:16px}
  .summary .line{margin:4px 0}
  .ok{color:#9ec97a}
  .ko{color:#e88}
  .neutral{color:#aab}
  .verdict{padding:12px;border-radius:8px;margin:16px 0;font-weight:600;font-size:15px}
  .verdict.ok{background:#1a3a1a;color:#9ec97a;border:1px solid #2a5a2a}
  .verdict.ko{background:#3a1a1a;color:#e88;border:1px solid #5a2a2a}
  button{background:#2a4a8a;color:#fff;border:0;padding:8px 16px;border-radius:6px;font-size:13px;margin:4px 4px 4px 0}
</style>
</head>
<body>
<h1>Diagnostic localStorage — Compagnon japonais</h1>
<div id="out"></div>
<button onclick="copy()">Copier tout</button>
<button onclick="location.reload()">Recharger</button>
<textarea id="copybuf" style="position:absolute;left:-9999px"></textarea>

<script>
const KEYS = [
  'japonais_essentiel_v1',             // learnedSet
  'japonais_essentiel_stats_v1',       // stats
  'japonais_essentiel_levels_v1',      // levels
  'japonais_essentiel_level_dir_v1',   // levelDir
  'japonais_essentiel_pattern_levels',
  'japonais_essentiel_pattern_stats',
  'japonais_essentiel_grammar_stats',
  'japonais_essentiel_patterns_notified',
  'japonais_essentiel_alphabet_unlocked',
  'japonais_essentiel_vocab_unlocked',
  'japonais_essentiel_numbers_unlocked',
  'japonais_essentiel_notes_visible',
  'japonais_essentiel_active_tab',
  // Activités
  'hiro_v8_del',
  'hiro_v8_done',
  'hiro_v8_fav',
  'japon_v1_cities',
  'japon_v1_order',
  'japon_v1_sort'
];

function fmt(v){
  if (v === null) return '[null — clé absente]';
  if (v === '') return '[chaîne vide]';
  if (v === '[]' || v === '{}') return v + ' [vide]';
  return v;
}

function countOf(v){
  if (v === null || v === '' || v === '[]' || v === '{}') return 0;
  try {
    const p = JSON.parse(v);
    if (Array.isArray(p)) return p.length;
    if (typeof p === 'object') return Object.keys(p).length;
    return 1;
  } catch(e){ return v.length > 0 ? 1 : 0; }
}

const out = document.getElementById('out');
let summary = '<div class="summary"><h2 style="margin-top:0">Résumé rapide</h2>';
let learnedCount = 0;
let levelsCount = 0;
let totalNonEmpty = 0;

for (const k of KEYS){
  const v = localStorage.getItem(k);
  const n = countOf(v);
  if (v !== null && v !== '' && v !== '[]' && v !== '{}') totalNonEmpty++;
  if (k === 'japonais_essentiel_v1') learnedCount = n;
  if (k === 'japonais_essentiel_levels_v1') levelsCount = n;
  const cls = (v === null || n === 0) ? 'ko' : 'ok';
  summary += `<div class="line"><span class="${cls}">${k}</span> : ${v === null ? 'absent' : n + ' élément(s)'}</div>`;
}

summary += `<div class="line neutral" style="margin-top:8px"><b>Clés non vides : ${totalNonEmpty} / ${KEYS.length}</b></div>`;
summary += `<div class="line neutral">Mots appris (learnedSet) : <b>${learnedCount}</b></div>`;
summary += `<div class="line neutral">Niveaux trackés (levels) : <b>${levelsCount}</b></div>`;
summary += '</div>';

// Verdict
let verdict = '';
if (learnedCount > 0 || levelsCount > 0) {
  verdict = `<div class="verdict ok">PROGRESSION TROUVÉE EN LOCAL : ${learnedCount} mots appris, ${levelsCount} niveaux trackés. Rien n'est perdu.</div>`;
} else if (totalNonEmpty === 0) {
  verdict = `<div class="verdict ko">localStorage TOTALEMENT VIDE pour cette origine. Soit autre navigateur/profil, soit cache vidé. Vérifie aussi mhuur.github.io exact path.</div>`;
} else {
  verdict = `<div class="verdict ko">Progression APPRENTISSAGE vide (0 mots, 0 niveaux), mais d'autres clés existent. Probable écrasement par le cloud LWW.</div>`;
}

out.innerHTML = verdict + summary + '<h2>Détail brut de toutes les clés</h2>';

for (const k of KEYS){
  const v = localStorage.getItem(k);
  const div = document.createElement('div');
  div.className = 'row';
  div.innerHTML = `<div class="key">${k}</div><div class="val">${fmt(v).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</div>`;
  out.appendChild(div);
}

function copy(){
  const lines = [];
  lines.push('=== Diagnostic localStorage ===');
  lines.push('Origin: ' + location.origin);
  lines.push('URL: ' + location.href);
  lines.push('Date: ' + new Date().toISOString());
  lines.push('');
  for (const k of KEYS){
    lines.push(k + ' = ' + (localStorage.getItem(k) || '[null]'));
  }
  const buf = document.getElementById('copybuf');
  buf.value = lines.join('\n');
  buf.select();
  document.execCommand('copy');
  alert('Contenu copié dans le presse-papier — colle-le dans Claude.');
}
</script>
</body>
</html>
